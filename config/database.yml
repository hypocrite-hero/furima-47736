# 共通設定（どの環境でも使う項目）
default: &default
  encoding: utf8
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

# 開発環境（MySQLを使用）
development:
  <<: *default
  adapter: mysql2
  username: root
  password:
  host: localhost
  database: furima_47736_development

# テスト環境（MySQLを使用）
test:
  <<: *default
  adapter: mysql2
  username: root
  password:
  host: localhost
  database: furima_47736_test

# 本番環境（PostgreSQLを使用 / Render用）
production:
  <<: *default
  adapter: postgresql
  encoding: unicode
  url: <%= ENV['DATABASE_URL'] %>
